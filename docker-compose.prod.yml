services:
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: /api
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports:
      - "${APP_PORT:-8080}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  server:
    build:
      context: ./server
    environment:
      PORT: 5001
      NODE_ENV: production
      CLIENT_URL: ${CLIENT_URL:-http://localhost:8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-typewriter_user}:${POSTGRES_PASSWORD:-typewriter_pass}@db:5432/${POSTGRES_DB:-typewriter_db}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in the root .env file}
      PASSWORD_PEPPER: ${PASSWORD_PEPPER:?Set PASSWORD_PEPPER in the root .env file}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-typewriter_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-typewriter_pass}
      POSTGRES_DB: ${POSTGRES_DB:-typewriter_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
